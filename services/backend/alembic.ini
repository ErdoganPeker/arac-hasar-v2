# Alembic config — arac-hasar-v2 backend
#
# Calistirma (services/backend altinda):
#   alembic upgrade head
#   alembic revision --autogenerate -m "add foo"
#   alembic downgrade -1
#
# sqlalchemy.url ENV'dan dinamik gelir (migrations/env.py icinde override edilir).

[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@db:5432/arac_hasar
timezone = UTC

# Migration dosya adi: 0001_initial.py gibi okunabilir prefix
file_template = %%(rev)s_%%(slug)s

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
