    orta: [1500, 3500]
    agir: [4000, 10000]
  dent:
    hafif: [500, 1500]
    orta: [2500, 5500]
    agir: [5500, 14000]    # Yeni tampon + boya + montaj
  crack:
    hafif: [400, 1200]
    orta: [2000, 4500]
    agir: [5000, 13000]
  default:
    hafif: [400, 1500]
    orta: [2000, 5000]
    agir: [5000, 13000]

