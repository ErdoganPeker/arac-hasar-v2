# cost_table.yaml
# Turkiye icin tahmini onarim maliyet araliklari (TL)
#
# UYARI: Bu degerler 2025 sonu/2026 baslangic genel piyasa rakamlarina dayali
# ILK tahmindir. Gercek pilot verisi ile (sigortaci hasar dosyalari, oto-pazar,
# yetkili servis fiyatlari) duzeltilmesi gerekir.
#
# Format:
#   <part_name>:
#     <damage_type>:
#       <severity>: [min_tl, max_tl]
#     default:                      # parca icin tum hasar tipleri default
#       <severity>: [min_tl, max_tl]
#
# Onerilen veri kaynaklari:
# - TSB (Turkiye Sigorta Birligi) ortalama hasar verisi
# - otoyedek.com, parcacim.com (yedek parca)
# - Renault/Fiat/Hyundai/Ford TR yetkili servis liste fiyatlari
# - Bagimsiz oto-boyaci tarifeleri (saha calismasi)

# Global fallback - parca bilinmiyorsa
_global:
  scratch:
    hafif: [200, 800]       # Pasta cila
    orta: [1000, 3500]      # Boya islemi
    agir: [3500, 12000]     # Genis alan boya
  dent:
    hafif: [400, 1500]      # PDR (boyasiz gocuk)
    orta: [2000, 5500]      # Duzeltme + boya
    agir: [5000, 18000]     # Parca degisimi
  crack:
    hafif: [300, 1200]
    orta: [1500, 4500]
    agir: [4000, 15000]
  glass_shatter:
    hafif: [800, 2500]      # Kucuk cam
    orta: [3000, 8000]      # Yan cam, far camlari
    agir: [4500, 14000]     # On cam tam degisim
  lamp_broken:
    hafif: [600, 2000]      # Cerceve onarimi
    orta: [2500, 7000]      # Far degisimi
    agir: [6000, 25000]     # LED/Xenon/Matrix far
  tire_flat:
    hafif: [200, 600]       # Yamalama
    orta: [1500, 4000]      # Tek lastik degisimi
    agir: [4500, 14000]     # Coklu lastik + jant

# Parca bazinda detay - daha hassas tahmin
front_bumper:
