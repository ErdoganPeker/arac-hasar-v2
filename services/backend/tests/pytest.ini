[pytest]
# pytest-asyncio mode=auto — async def test fonksiyonlari otomatik
# olarak event loop'ta calistirilir; @pytest.mark.asyncio sart degil.
asyncio_mode = auto
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
markers =
    integration: requires live docker stack + real ML weights (set INTEGRATION_DOCKER=1)
