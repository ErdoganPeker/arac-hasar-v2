  #       value: cpu
  #     - key: MODEL_DIR
  #       value: /app/models
  #     - key: MODEL_VARIANT
  #       value: small
  #     - key: SKIP_MODEL_FETCH
  #       value: "1"
  #     - key: DATABASE_URL
  #       sync: false
  #     - key: REDIS_URL
  #       sync: false
